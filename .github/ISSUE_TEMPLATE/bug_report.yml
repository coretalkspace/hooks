name: Bug report
description: Report something that is broken or incorrect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in what you can.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One short sentence describing the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, in order, before you saw the bug?
      placeholder: "1. …\n2. …\n3. …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead (errors, wrong output, etc.)?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, deployment target, or other context if relevant.
    validations:
      required: false
